    <style>


        /* Inline-Anzeige der empfohlenen Maßnahme unter einem Mangel */
        .measure-suggestion {
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            border-left: 4px solid #b30000;
            background: #fff5f5;
            border-radius: 4px;
        }

        .measure-label {
            display: block;
            font-size: 0.75rem;

            letter-spacing: 0.05em;
            color: #b30000;
            margin-bottom: 0.25rem;
        }

            font-size: 0.9rem;

            color: #1f2937;

                size: A4;

            .signature-actions {

                font-size: 11px;

                width: 100%;
                margin: 0;
                padding: 0;
            }

            .card,
            .checklist-item,

                box-shadow: none !important;
                border: 1px solid #ccc;
                break-inside: avoid;
                page-break-inside: avoid;

                padding: 10px;

            .checklist-item {

            }

            }

            .signatures-section {
                page-break-before: always;

            }

            .signatures-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .signature-block {
                margin-top: 20px;
                padding: 12px;
            }

            .signature-canvas {

            }
        }

    <script>

        // ==========================================
        // Druckfunktion fuer Tauri/Desktop
        // ==========================================
        function printAudit() {

            // Vor dem Drucken alle Textfelder automatisch an Inhalt anpassen
            document.querySelectorAll("textarea").forEach((textarea) => {
                textarea.style.height = "auto";
                textarea.style.height = textarea.scrollHeight + "px";
            });

            // Kleine Verzögerung damit das Layout korrekt berechnet wird
            setTimeout(() => {
                window.print();
            }, 150);
        }

        // ==========================================
        // Tauri-kompatibler PDF Export
        // ==========================================
        async function exportPDF() {

            try {

                const { jsPDF } = window.jspdf;

                const doc = new jsPDF({
                    orientation: "portrait",
                    unit: "mm",
                    format: "a4"
                });

                let y = 20;

                doc.setFontSize(18);
                doc.text("Arbeitssicherheits-Audit", 20, y);

                y += 12;

                const firma = document.getElementById("firma").value || "-";
                const standort = document.getElementById("standort").value || "-";
                const pruefer = document.getElementById("pruefer").value || "-";
                const datum = document.getElementById("datum").value || "-";

                doc.setFontSize(11);

                doc.text(`Firma: ${firma}`, 20, y);
                y += 8;

                doc.text(`Standort: ${standort}`, 20, y);
                y += 8;

                doc.text(`Pruefer: ${pruefer}`, 20, y);
                y += 8;

                doc.text(`Datum: ${datum}`, 20, y);
                y += 15;

                doc.setFontSize(14);
                doc.text("Checkliste", 20, y);

                y += 10;

                const checklistItems = document.querySelectorAll(".checklist-item");

                checklistItems.forEach((item, index) => {

                    const title =
                        item.querySelector(".item-title")?.innerText ||
                        `Pruefpunkt ${index + 1}`;

                    const itemId = item.getAttribute("data-item-id");

                    let status = "offen";
                    const selectedBtn = item.querySelector(".rating-btn.selected");
                    if (selectedBtn) {
                        if (selectedBtn.classList.contains("ok")) status = "ok";
                        else if (selectedBtn.classList.contains("mangel")) status = "mangel";
                        else if (selectedBtn.classList.contains("na")) status = "na";
                    }

                    const kommentar =
                        item.querySelector("textarea")?.value || "";

                    let statusText = "";

                    switch (status) {
                        case "ok":
                            statusText = "OK";
                            break;

                        case "mangel":
                            statusText = "Mangel";
                            break;

                        case "na":
                            statusText = "Nicht zutreffend";
                            break;

                        default:
                            statusText = "Offen";
                    }

                    const line = `${index + 1}. ${title} [${statusText}]`;

                    const splitText = doc.splitTextToSize(line, 170);

                    let estimatedHeight = (splitText.length * 7) + 10;

                    if (kommentar.trim() !== "") {
                        estimatedHeight += 18;
                    }

                    if (status === "mangel" && typeof getMeasureText === "function") {
                        estimatedHeight += 18;
                    }

                    if (y + estimatedHeight > 270) {
                        doc.addPage();
                        y = 20;
                    }

                    doc.text(splitText, 20, y);

                    y += splitText.length * 7;

                    if (kommentar.trim() !== "") {

                        const commentText =
                            doc.splitTextToSize(
                                "Kommentar: " + kommentar,
                                160
                            );

                        doc.setFontSize(10);

                        doc.text(commentText, 28, y);

                        y += commentText.length * 6;

                        doc.setFontSize(11);
                    }

                    if (status === "mangel" && typeof getMeasureText === "function") {
                        const measureText = doc.splitTextToSize(
                            "Maßnahme: " + getMeasureText(itemId),
                            160
                        );
                        doc.setFontSize(10);
                        doc.text(measureText, 28, y);
                        y += measureText.length * 6;
                        doc.setFontSize(11);
                    }

                    y += 5;

                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                });

                // Download
                doc.save("arbeitssicherheits-audit.pdf");

            } catch (err) {

                console.error("PDF Fehler:", err);

                alert(
                    "PDF Export fehlgeschlagen. Druckdialog wird geöffnet."
                );

                window.print();
            }
        }

    </script>
<script>

function exportMeasuresPDF() {

// Speichert die IDs der aktuell geöffneten Kategorien
let openCategories = new Set();

function renderChecklist() {
    const container = document.getElementById('checklist-container');
    if (!container) return;
    
    container.innerHTML = '';
    
    AUDIT_CATEGORIES.forEach(category => {
        const filteredItems = filterItems(category.items);
        if (filteredItems.length === 0 && currentFilter !== 'all') return;
        
        // Prüfen, ob diese Kategorie offen sein soll
        const isOpen = openCategories.has(category.id);
        
        const categoryEl = document.createElement('div');
        categoryEl.className = 'category-section';
        categoryEl.innerHTML = `
            <div class="category-header" onclick="toggleCategory('${category.id}')">
                <span class="category-title">
                    <!-- Icon-Drehung angepasst an den Zustand -->
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: ${isOpen ? 'rotate(90deg)' : 'rotate(0deg)'}; transition: transform 0.2s;"><path d="m9 18 6-6-6-6"/></svg>
                    ${category.name}
                </span>
                <span class="category-badge">${filteredItems.length} / ${category.items.length} Prüfpunkte</span>
            </div>
            <!-- Klasse "collapsed" wird nur hinzugefügt, wenn sie NICHT offen ist -->
            <div class="category-content ${isOpen ? '' : 'collapsed'}" id="category-${category.id}">
                ${renderCategoryItems(filteredItems)}
            </div>
        `;
        container.appendChild(categoryEl);
    });
}

function toggleCategory(categoryId) {
    const content = document.getElementById(`category-${categoryId}`);
    const header = content.previousElementSibling;
    const icon = header.querySelector('svg');
    
    content.classList.toggle('collapsed');
    
    const isCollapsed = content.classList.contains('collapsed');
    
    // Zustand im Set speichern oder löschen
    if (isCollapsed) {
        openCategories.delete(categoryId);
        icon.style.transform = 'rotate(0deg)';
    } else {
        openCategories.add(categoryId);
        icon.style.transform = 'rotate(90deg)';
    }
}

// Service Worker optional
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("✅ Service Worker registriert"))
      .catch(err => console.error("❌ Service Worker Fehler:", err));
  });
}
</script>
