       <style>
        /* Inline-Anzeige der empfohlenen Maßnahme unter einem Mangel */
        .measure-suggestion {
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            border-left: 4px solid #b30000;
            background: #fff5f5;
            border-radius: 4px;
        }

        .measure-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #b30000;
            margin-bottom: 0.25rem;
        }

        .measure-text {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #1f2937;
        }

        @media print {
            @page {
                size: A4;
                /* Zwingend 0, damit die tauri.localhost URL links unten verschwindet */
                margin: 0 !important; 
            }

            .header,
            .footer,
            .action-bar,
            .filter-buttons,
            .signature-actions {
                display: none !important;
            }

            html,
            body {
                background: white;
                color: black;
                font-size: 10px; /* Leicht verkleinert, spart enorm viele Seiten */
                line-height: 1.3;
                counter-reset: page;
            }

            .main-content {
                width: 100%;
                /* Padding simuliert den Seitenrand, hält aber die URL fern */
                padding: 15mm 15mm 20mm 15mm !important; 
                box-sizing: border-box;
            }

            /* --- PLATZSPARENDE OPTIONEN NEBENEINANDER --- */
            /* Ersetze '.options-container' mit der echten CSS-Klasse deiner Buttons/Radio-Kompontente */
            .checklist-item .options-container, 
            .checklist-item .radio-group,
            .checklist-item .status-buttons {
                display: flex !important;
                flex-direction: row !important; /* Erzwingt Nebeneinander-Darstellung */
                gap: 15px !important;
                margin-top: 5px !important;
                margin-bottom: 5px !important;
            }

            /* Gestaltet die Auswahl-Optionen kompakt nebeneinander */
            .checklist-item label, 
            .checklist-item .btn-option {
                display: inline-flex !important;
                align-items: center !important;
                font-size: 10px !important;
                padding: 2px 6px !important;
                margin: 0 !important;
            }

            /* Verhindert riesige Lücken bei Textfeldern im Druck */
            .checklist-item textarea {
                min-height: auto !important;
                height: 35px !important; 
                margin-top: 5px !important;
            }

            .card,
            .checklist-item,
            .signature-block {
                box-shadow: none !important;
                border: 1px solid #ccc;
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .card {
                margin-bottom: 8px;
                padding: 8px;
            }

            .checklist-item {
                margin-bottom: 6px;
                padding: 6px;
            }

            .item-title,
            .measure-text,
            textarea,
            p,
            span {
                word-break: break-word;
                overflow-wrap: break-word;
                white-space: pre-wrap;
            }

            .signatures-section {
                page-break-before: always;
                break-before: page;
            }

            .signatures-grid {
                grid-template-columns: 1fr 1fr; /* Unterschriften nebeneinander spart eine halbe Seite */
                gap: 15px;
            }

            .signature-block {
                margin-top: 10px;
                padding: 8px;
            }

            .signature-canvas {
                width: 100% !important;
                max-width: 100%;
                height: 80px !important; /* Kompaktere Boxen */
                border: 1px solid #000;
            }

            /* --- MINI SEITENANZAHL UNTEN RECHTS --- */
            .print-footer {
                display: block !important;
                position: fixed;
                bottom: 8mm;
                right: 15mm;
                font-size: 7.5pt; /* Sehr kleine Schrift */
                font-family: sans-serif;
                color: #555;
            }

            .print-footer::after {
                counter-increment: page;
                content: "Seite " counter(page) " von " counter(pages);
            }
        }

        /* Verhindert, dass der Footer auf dem normalen Bildschirm sichtbar ist */
        @media screen {
            .print-footer {
                display: none;
            }
        }
    </style>

    <script>
async function shareAuditPDF() {

    try {

        const { jsPDF } = window.jspdf;

        const doc = new jsPDF({
            orientation: "portrait",
            unit: "mm",
            format: "a4"
        });

        const pageWidth = 210;
        const pageHeight = 297;

        const margin = 18;
        const maxWidth = pageWidth - (margin * 2);

        let y = 20;

        // =========================
        // HEADER
        // =========================

        doc.setFont("helvetica", "bold");
        doc.setFontSize(20);

        doc.text(
            "Arbeitssicherheits-Audit",
            margin,
            y
        );

        y += 14;

        doc.setFont("helvetica", "normal");
        doc.setFontSize(11);

        const firma =
            document.getElementById("firma").value || "-";

        const standort =
            document.getElementById("standort").value || "-";

        const pruefer =
            document.getElementById("pruefer").value || "-";

        const datum =
            document.getElementById("datum").value || "-";

        const infoLines = [
            `Firma: ${firma}`,
            `Standort: ${standort}`,
            `Prüfer: ${pruefer}`,
            `Datum: ${datum}`
        ];

        infoLines.forEach(line => {

            doc.text(line, margin, y);

            y += 7;
        });

        y += 10;

        // =========================
        // CHECKLISTE
        // =========================

        doc.setFont("helvetica", "bold");
        doc.setFontSize(15);

        doc.text("Prüfpunkte", margin, y);

        y += 10;

        const checklistItems =
            document.querySelectorAll(".checklist-item");

        checklistItems.forEach((item, index) => {

            const title =
                item.querySelector(".item-title")
                    ?.innerText ||
                `Prüfpunkt ${index + 1}`;

            const itemId =
                item.getAttribute("data-item-id");

            let status = "Offen";

            const selectedBtn =
                item.querySelector(".rating-btn.selected");

            if (selectedBtn) {

                if (
                    selectedBtn.classList.contains("ok")
                ) {
                    status = "OK";
                }

                if (
                    selectedBtn.classList.contains("mangel")
                ) {
                    status = "Mangel";
                }

                if (
                    selectedBtn.classList.contains("na")
                ) {
                    status = "Nicht zutreffend";
                }
            }

            const kommentar =
                item.querySelector("textarea")
                    ?.value || "";

            let measureText = "";

            if (
                status === "Mangel" &&
                typeof getMeasureText === "function"
            ) {

                measureText =
                    getMeasureText(itemId);
            }

            // =========================
            // TEXT UMBRUCH
            // =========================

            const titleLines =
                doc.splitTextToSize(
                    `${index + 1}. ${title} (${status})`,
                    maxWidth
                );

            const kommentarLines =
                kommentar
                    ? doc.splitTextToSize(
                        `Kommentar: ${kommentar}`,
                        maxWidth - 5
                    )
                    : [];

            const measureLines =
                measureText
                    ? doc.splitTextToSize(
                        `Maßnahme: ${measureText}`,
                        maxWidth - 5
                    )
                    : [];

            // =========================
            // HÖHE BERECHNEN
            // =========================

            let blockHeight =
                (titleLines.length * 6) +
                (kommentarLines.length * 5) +
                (measureLines.length * 5) +
                12;

            // =========================
            // SEITENUMBRUCH
            // =========================

            if (
                y + blockHeight >
                pageHeight - 25
            ) {

                doc.addPage();

                y = 20;
            }

            // =========================
            // TITEL
            // =========================

            doc.setFont("helvetica", "bold");
            doc.setFontSize(11);

            doc.text(
                titleLines,
                margin,
                y
            );

            y += titleLines.length * 6;

            // =========================
            // KOMMENTAR
            // =========================

            if (kommentarLines.length > 0) {

                doc.setFont("helvetica", "normal");
                doc.setFontSize(10);

                doc.text(
                    kommentarLines,
                    margin + 5,
                    y
                );

                y +=
                    (kommentarLines.length * 5) + 3;
            }

            // =========================
            // MASSNAHME
            // =========================

            if (measureLines.length > 0) {

                doc.setFont("helvetica", "italic");
                doc.setFontSize(10);

                doc.text(
                    measureLines,
                    margin + 5,
                    y
                );

                y +=
                    (measureLines.length * 5) + 3;
            }

            // Linie

            doc.setDrawColor(220);

            doc.line(
                margin,
                y,
                pageWidth - margin,
                y
            );

            y += 8;
        });

        // =========================
        // UNTERSCHRIFTEN EXTRA SEITE
        // =========================

        doc.addPage();

        y = 30;

        doc.setFont("helvetica", "bold");
        doc.setFontSize(16);

        doc.text(
            "Unterschriften",
            margin,
            y
        );

        y += 25;

        // Prüfer

        doc.setFontSize(12);

        doc.text(
            "Prüfer",
            margin,
            y
        );

        y += 5;

        doc.rect(
            margin,
            y,
            75,
            35
        );

        const prueferCanvas =
            document.getElementById(
                "signature-pruefer"
            );

        if (prueferCanvas) {

            const img =
                prueferCanvas.toDataURL(
                    "image/png"
                );

            doc.addImage(
                img,
                "PNG",
                margin + 2,
                y + 2,
                71,
                31
            );
        }

        // Verantwortlicher

        const x2 = 115;

        doc.text(
            "Verantwortlicher",
            x2,
            y - 5
        );

        doc.rect(
            x2,
            y,
            75,
            35
        );

        const verCanvas =
            document.getElementById(
                "signature-verantwortlicher"
            );

        if (verCanvas) {

            const img2 =
                verCanvas.toDataURL(
                    "image/png"
                );

            doc.addImage(
                img2,
                "PNG",
                x2 + 2,
                y + 2,
                71,
                31
            );
        }

        // =========================
        // SEITENNUMMERN
        // =========================

        const pageCount =
            doc.internal.getNumberOfPages();

        for (
            let i = 1;
            i <= pageCount;
            i++
        ) {

            doc.setPage(i);

            doc.setFontSize(9);

            doc.text(
                `Seite ${i} von ${pageCount}`,
                170,
                290
            );
        }

        // =========================
        // PDF
        // =========================

        const pdfBlob =
            doc.output("blob");

        const fileName =
            `audit_${Date.now()}.pdf`;

        const file =
            new File(
                [pdfBlob],
                fileName,
                {
                    type:
                        "application/pdf"
                }
            );

        // =========================
        // iPAD SHARE
        // =========================

        if (
            navigator.canShare &&
            navigator.canShare({
                files: [file]
            })
        ) {

            await navigator.share({

                title:
                    "Arbeitssicherheits-Audit",

                text:
                    "Audit PDF im Anhang",

                files: [file]

            });

        } else {

            // FALLBACK DOWNLOAD

            const url =
                URL.createObjectURL(
                    pdfBlob
                );

            const a =
                document.createElement("a");

            a.href = url;

            a.download = fileName;

            document.body.appendChild(a);

            a.click();

            document.body.removeChild(a);

            URL.revokeObjectURL(url);
        }

        // =========================
        // MAIL APP ÖFFNEN
        // =========================

        const subject =
            encodeURIComponent(
                "Arbeitssicherheits-Audit"
            );

    const markt =
    `${firma} - ${standort}`;

const body =
    encodeURIComponent(
`Sehr geehrte Damen und Herren,

im Rahmen der turnusmäßigen Arbeitssicherheitsbegehung übersende ich Ihnen anbei das Begehungsprotokoll des Marktes ${markt} zur sachlichen Prüfung.

Bitte prüfen Sie die dokumentierten Feststellungen und veranlassen Sie die Umsetzung der erforderlichen Maßnahmen.

Mit freundlichen Grüßen
Fachkraft für Arbeitssicherheit (SiFa)`
    );

        window.location.href =
            `mailto:?subject=${subject}&body=${body}`;

    } catch (err) {

        console.error(err);

        alert(
            "PDF Export fehlgeschlagen"
        );
    }
}

        // ==========================================
        // Druckfunktion fuer Tauri/Desktop
        // ==========================================
        function printAudit() {

            // Vor dem Drucken alle Textfelder automatisch an Inhalt anpassen
            document.querySelectorAll("textarea").forEach((textarea) => {
                textarea.style.height = "auto";
                textarea.style.height = textarea.scrollHeight + "px";
            });

            // Kleine Verzögerung damit das Layout korrekt berechnet wird
            setTimeout(() => {
                window.print();
            }, 150);
        }

        // ==========================================
        // Tauri-kompatibler PDF Export
        // ==========================================
        async function exportPDF() {

            try {

                const { jsPDF } = window.jspdf;

                const doc = new jsPDF({
                    orientation: "portrait",
                    unit: "mm",
                    format: "a4"
                });


                let y = 20;

                doc.setFontSize(18);
                doc.text("Arbeitssicherheits-Audit", 20, y);

                y += 12;

                const firma = document.getElementById("firma").value || "-";
                const standort = document.getElementById("standort").value || "-";
                const pruefer = document.getElementById("pruefer").value || "-";
                const datum = document.getElementById("datum").value || "-";

                doc.setFontSize(11);

                doc.text(`Firma: ${firma}`, 20, y);
                y += 8;

                doc.text(`Standort: ${standort}`, 20, y);
                y += 8;

                doc.text(`Pruefer: ${pruefer}`, 20, y);
                y += 8;

                doc.text(`Datum: ${datum}`, 20, y);
                y += 15;

                doc.setFontSize(14);
                doc.text("Checkliste", 20, y);

                y += 10;

                const checklistItems = document.querySelectorAll(".checklist-item");

                checklistItems.forEach((item, index) => {

                    const title =
                        item.querySelector(".item-title")?.innerText ||
                        `Pruefpunkt ${index + 1}`;

                    const itemId = item.getAttribute("data-item-id");

                    let status = "offen";
                    const selectedBtn = item.querySelector(".rating-btn.selected");
                    if (selectedBtn) {
                        if (selectedBtn.classList.contains("ok")) status = "ok";
                        else if (selectedBtn.classList.contains("mangel")) status = "mangel";
                        else if (selectedBtn.classList.contains("na")) status = "na";
                    }

                    const kommentar =
                        item.querySelector("textarea")?.value || "";

                    let statusText = "";

                    switch (status) {
                        case "ok":
                            statusText = "OK";
                            break;

                        case "mangel":
                            statusText = "Mangel";
                            break;

                        case "na":
                            statusText = "Nicht zutreffend";
                            break;

                        default:
                            statusText = "Offen";
                    }

                    const line = `${index + 1}. ${title} [${statusText}]`;

                    const splitText = doc.splitTextToSize(line, 170);

                    let estimatedHeight = (splitText.length * 7) + 10;

                    if (kommentar.trim() !== "") {
                        estimatedHeight += 18;
                    }

                    if (status === "mangel" && typeof getMeasureText === "function") {
                        estimatedHeight += 18;
                    }

                    if (y + estimatedHeight > 270) {
                        doc.addPage();
                        y = 20;
                    }

                    doc.text(splitText, 20, y);

                    y += splitText.length * 7;

                    if (kommentar.trim() !== "") {

                        const commentText =
                            doc.splitTextToSize(
                                "Kommentar: " + kommentar,
                                160
                            );

                        doc.setFontSize(10);

                        doc.text(commentText, 28, y);

                        y += commentText.length * 6;

                        doc.setFontSize(11);
                    }

                    if (status === "mangel" && typeof getMeasureText === "function") {
                        const measureText = doc.splitTextToSize(
                            "Maßnahme: " + getMeasureText(itemId),
                            160
                        );
                        doc.setFontSize(10);
                        doc.text(measureText, 28, y);
                        y += measureText.length * 6;
                        doc.setFontSize(11);
                    }

                    y += 5;

                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                });

                // Download
                doc.save("arbeitssicherheits-audit.pdf");

            } catch (err) {

                console.error("PDF Fehler:", err);

                alert(
                    "PDF Export fehlgeschlagen. Druckdialog wird geöffnet."
                );

                window.print();
            }
        }

    </script>
<script>

// Speichert die IDs der aktuell geöffneten Kategorien
let openCategories = new Set();

function renderChecklist() {
    const container = document.getElementById('checklist-container');
    if (!container) return;
    
    container.innerHTML = '';
    
    AUDIT_CATEGORIES.forEach(category => {
        const filteredItems = filterItems(category.items);
        if (filteredItems.length === 0 && currentFilter !== 'all') return;
        
        // Prüfen, ob diese Kategorie offen sein soll
        const isOpen = openCategories.has(category.id);
        
        const categoryEl = document.createElement('div');
        categoryEl.className = 'category-section';
        categoryEl.innerHTML = `
            <div class="category-header" onclick="toggleCategory('${category.id}')">
                <span class="category-title">
                    <!-- Icon-Drehung angepasst an den Zustand -->
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: ${isOpen ? 'rotate(90deg)' : 'rotate(0deg)'}; transition: transform 0.2s;"><path d="m9 18 6-6-6-6"/></svg>
                    ${category.name}
                </span>
                <span class="category-badge">${filteredItems.length} / ${category.items.length} Prüfpunkte</span>
            </div>
            <!-- Klasse "collapsed" wird nur hinzugefügt, wenn sie NICHT offen ist -->
            <div class="category-content ${isOpen ? '' : 'collapsed'}" id="category-${category.id}">
                ${renderCategoryItems(filteredItems)}
            </div>
        `;
        container.appendChild(categoryEl);
    });
}

function toggleCategory(categoryId) {
    const content = document.getElementById(`category-${categoryId}`);
    const header = content.previousElementSibling;
    const icon = header.querySelector('svg');
    
    content.classList.toggle('collapsed');
    
    const isCollapsed = content.classList.contains('collapsed');
    
    // Zustand im Set speichern oder löschen
    if (isCollapsed) {
        openCategories.delete(categoryId);
        icon.style.transform = 'rotate(0deg)';
    } else {
        openCategories.add(categoryId);
        icon.style.transform = 'rotate(90deg)';
    }
}


</script>
  <div class="print-footer"></div>
</body>
