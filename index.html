<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arbeitssicherheit Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#eef3f9;
    color:#1e293b;
}

/* ================= HERO ================= */

.hero{
    background:linear-gradient(135deg,#003b8f 0%, #0a2f73 60%, #05204d 100%);
    color:#fff;
    padding:60px 20px 100px;
    position:relative;
    overflow:hidden;
    text-align:center;
}

.hero::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-60px;
    width:100%;
    height:120px;
    background:#eef3f9;
    border-radius:100% 100% 0 0;
}

.hero-icon{
    font-size:50px;
    margin-bottom:15px;
}

.hero h1{
    font-size:54px;
    font-weight:800;
    margin-bottom:10px;
}

.hero p{
    font-size:22px;
    opacity:0.95;
}

/* ================= CONTAINER ================= */

.container{
    max-width:520px;
    margin:-60px auto 40px;
    padding:0 20px;
    position:relative;
}

/* ================= CARD ================= */

.card{
    background:#fff;
    border-radius:26px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.10);
}

/* INFO */

.secure{
    text-align:center;
    font-size:16px;
    margin-bottom:20px;
    color:#1d4ed8;
}

/* FORM */

label{
    display:block;
    margin-top:15px;
    font-weight:600;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    margin-top:6px;
    border:1px solid #dbe4f0;
    border-radius:14px;
    font-size:15px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

/* SHOW PASSWORD */

.show-password{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
    font-size:14px;
}

/* BUTTON */

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#0066ff,#0046b8);
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

/* ERROR */

.error{
    margin-top:10px;
    color:red;
    text-align:center;
    font-size:14px;
}

/* ================= FOOTER ================= */

footer{
    text-align:center;
    padding:25px;
    font-size:14px;
    color:#64748b;
}

footer a{
    color:#2563eb;
    text-decoration:none;
    margin:0 8px;
}

/* ================= DARK MODE ================= */

body.dark{
    background:#0f172a;
    color:#e2e8f0;
}

body.dark .card{
    background:#1e293b;
}

body.dark input{
    background:#334155;
    color:#fff;
    border-color:#475569;
}

body.dark footer{
    color:#94a3b8;
}

/* ================= TOGGLE ================= */

.theme-toggle{
    position:fixed;
    top:10px;
    right:10px;
    width:32px;
    height:32px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:#fff;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ================= DESKTOP SMALLER OPTIMIZATION ================= */

@media(min-width:1024px){

    .hero h1{
        font-size:46px;
    }

    .hero p{
        font-size:18px;
    }

    button{
        font-size:15px;
        padding:12px;
    }

    .card{
        padding:28px;
    }
}

/* ================= MOBILE ================= */

@media(max-width:600px){

    .hero h1{
        font-size:32px;
    }

    .hero p{
        font-size:16px;
    }

    .card{
        padding:22px;
        border-radius:20px;
    }

    button{
        font-size:15px;
    }
}

</style>
</head>

<body>

<button class="theme-toggle">☀️</button>

<section class="hero">
    <div class="hero-icon"><i class="fas fa-shield-alt"></i></div>
    <h1>Arbeitssicherheit</h1>
    <p>Moderne Lösungen für sichere Arbeitsplätze</p>
</section>

<div class="container">

    <div class="card">

        <div class="secure">🔐 Passwortgeschützt</div>

        <form id="loginForm">

            <label>Benutzername</label>
            <input type="text" id="username" required>

            <label>Passwort</label>
            <input type="password" id="password" required>

            <div class="show-password">
                <input type="checkbox" id="togglePassword">
                <label for="togglePassword">Passwort anzeigen</label>
            </div>

            <button type="submit">Anmelden</button>
            <div class="error" id="errorMsg"></div>

        </form>
    </div>
</div>

<footer>
    © 2026 Andreas Zott |
    <a href="datenschutz.html">Datenschutz</a> |
    <a href="impressum.html">Impressum</a>
</footer>

<script>
// Passwort toggle
document.getElementById("togglePassword").addEventListener("change", function () {
    const pw = document.getElementById("password");
    pw.type = this.checked ? "text" : "password";
});

// Login
const validUsers = {
    "admin":"sifa",
    "frank":"877",
    "jörg":"380",
    "carsten":"159"
};

document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const u = document.getElementById("username").value.trim().toLowerCase();
    const p = document.getElementById("password").value;

    if(validUsers[u] && validUsers[u] === p){
        window.location.href="welcome.html";
    } else {
        document.getElementById("errorMsg").textContent =
        "Falscher Benutzername oder Passwort!";
    }
});

// Dark Mode
const btn = document.querySelector(".theme-toggle");
const body = document.body;

btn.addEventListener("click", () => {
    body.classList.toggle("dark");
    btn.textContent = body.classList.contains("dark") ? "🌙" : "☀️";
});
</script>

</body>
</html>
